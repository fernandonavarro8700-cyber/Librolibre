<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#7C3AED"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="LibroLibre"/>
  <meta name="description" content="Lee tus documentos en cualquier formato."/>
  <title>LibroLibre</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icons/icon-192.png"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:      #0D0D1A;
      --bg2:     #1A1A2E;
      --bg3:     #16213E;
      --card:    #1E1E32;
      --navbar:  #0D0D1A;
      --text:    #E8E4D8;
      --text2:   #9090B0;
      --accent:  #7C3AED;
      --accent2: #A78BFA;
      --border:  rgba(124,58,237,0.18);
      --tag:     rgba(124,58,237,0.18);
      --tagtext: #A78BFA;
      --nav-h:   62px;
    }

    html,body{
      height:100%;width:100%;
      background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }
    #app{
      display:flex;flex-direction:column;
      height:100vh;width:100%;max-width:540px;
      margin:0 auto;position:relative;overflow:hidden;
      background:var(--bg);
    }

    /* ── SCREENS ── */
    .screen{display:none;flex-direction:column;flex:1;overflow:hidden;padding-bottom:var(--nav-h)}
    .screen.active{display:flex}

    /* ── TOPBAR ── */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px 10px;
      background:var(--navbar);
      border-bottom:0.5px solid var(--border);
      flex-shrink:0;
    }
    .topbar-title{
      font-size:20px;font-weight:700;color:var(--text);
      display:flex;align-items:center;gap:8px;
    }
    /* Logo igual que Palabra Diaria: cuadrado redondeado violeta con ✦ */
    .app-logo{
      width:32px;height:32px;border-radius:8px;
      background:var(--accent);
      display:flex;align-items:center;justify-content:center;
      font-size:16px;color:#fff;flex-shrink:0;
    }
    .topbar-actions{display:flex;gap:4px}
    .icon-btn{
      background:none;border:none;color:var(--text2);
      cursor:pointer;padding:7px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      transition:background 0.15s;
    }
    .icon-btn:active{background:var(--bg2)}
    .icon-btn svg{width:22px;height:22px}

    /* ── CONTENT ── */
    .content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

    /* ── NAVBAR FIJO ── */
    .navbar{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:540px;
      display:flex;background:var(--navbar);
      border-top:0.5px solid var(--border);
      height:var(--nav-h);
      padding-bottom:env(safe-area-inset-bottom,0px);
      z-index:999;
    }
    .nav-item{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:3px;cursor:pointer;
      color:var(--text2);font-size:10px;font-weight:500;
      background:none;border:none;padding:6px 2px;
      transition:color 0.15s;
      -webkit-tap-highlight-color:transparent;
    }
    .nav-item svg{width:22px;height:22px}
    .nav-item.active{color:var(--accent)}
    .nav-item.active svg{stroke:var(--accent)}

    /* ── SECTION TITLE ── */
    .section-title{font-size:11px;font-weight:700;color:var(--text2);
      text-transform:uppercase;letter-spacing:0.7px;margin:0 0 10px}

    /* ── HERO ── */
    .hero-banner{
      background:var(--card);border:0.5px solid var(--border);
      border-radius:16px;padding:18px 16px;
      display:flex;align-items:center;gap:14px;margin-bottom:22px;
      position:relative;overflow:hidden;
    }
    .hero-banner::before{
      content:'';position:absolute;top:-20px;right:-20px;
      width:100px;height:100px;border-radius:50%;
      background:rgba(124,58,237,0.12);
    }
    .hero-cover{
      width:58px;height:80px;
      background:var(--bg2);
      border-radius:6px 2px 2px 6px;
      border-left:3px solid var(--accent);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;font-size:26px;
    }
    .hero-info{flex:1;min-width:0}
    .hero-label{font-size:10px;color:var(--accent2);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
    .hero-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .hero-author{font-size:12px;color:var(--text2);margin-bottom:10px}
    .progress-track{background:var(--bg2);border-radius:4px;height:4px;margin-bottom:8px}
    .progress-fill{background:var(--accent);border-radius:4px;height:4px;transition:width 0.4s}
    .hero-btn{
      background:var(--accent);color:#fff;border:none;
      border-radius:20px;padding:6px 16px;
      font-size:12px;font-weight:600;cursor:pointer;
    }

    /* ── BOOK CARDS ── */
    .books-row{
      display:flex;gap:12px;overflow-x:auto;
      padding-bottom:10px;scrollbar-width:none;
      -webkit-overflow-scrolling:touch;
    }
    .books-row::-webkit-scrollbar{display:none}
    .book-card{flex-shrink:0;width:90px;cursor:pointer}
    .book-cover{
      width:90px;height:126px;
      border-radius:6px 3px 3px 6px;
      background:var(--card);
      display:flex;align-items:center;justify-content:center;
      font-size:28px;margin-bottom:6px;
      position:relative;overflow:hidden;
      border:0.5px solid var(--border);
      transition:transform 0.15s;
    }
    .book-card:active .book-cover{transform:scale(0.96)}
    .book-spine{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
    .book-info{font-size:11px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .fmt-tag{
      display:inline-block;background:var(--tag);color:var(--tagtext);
      font-size:9px;font-weight:700;padding:2px 7px;
      border-radius:4px;margin-top:3px;letter-spacing:0.3px;
    }

    /* ── COL GRID ── */
    .col-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .col-card{
      background:var(--card);border:0.5px solid var(--border);
      border-radius:14px;padding:14px;cursor:pointer;transition:background 0.15s;
    }
    .col-card:active{background:var(--bg2)}
    .col-card svg{width:24px;height:24px;color:var(--accent);margin-bottom:6px;display:block}
    .col-card-title{font-size:13px;font-weight:600;color:var(--text)}
    .col-card-sub{font-size:11px;color:var(--text2);margin-top:2px}

    /* ── CHIPS ── */
    .filter-row{
      display:flex;gap:8px;overflow-x:auto;
      padding-bottom:4px;scrollbar-width:none;margin-bottom:14px;
    }
    .filter-row::-webkit-scrollbar{display:none}
    .chip{
      flex-shrink:0;padding:6px 14px;border-radius:20px;
      font-size:12px;font-weight:600;
      border:1px solid var(--border);
      background:var(--card);color:var(--text2);
      cursor:pointer;transition:all 0.15s;white-space:nowrap;
    }
    .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

    /* ── SEARCH ── */
    .search-box{
      display:flex;align-items:center;gap:8px;
      background:var(--card);border-radius:12px;
      padding:11px 14px;margin-bottom:14px;
      border:0.5px solid var(--border);
    }
    .search-box svg{width:18px;height:18px;color:var(--text2);flex-shrink:0}
    .search-box input{
      background:none;border:none;outline:none;
      font-size:15px;color:var(--text);flex:1;font-family:inherit;
    }
    .search-box input::placeholder{color:var(--text2)}

    /* ── LIST BOOK ── */
    .list-book{
      display:flex;align-items:center;gap:12px;
      padding:13px 0;border-bottom:0.5px solid var(--border);
      cursor:pointer;
    }
    .list-book:active{opacity:0.7}
    .list-cover{
      width:48px;height:66px;border-radius:5px 2px 2px 5px;
      background:var(--card);border:0.5px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;flex-shrink:0;position:relative;overflow:hidden;
    }
    .list-spine{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
    .list-info{flex:1;min-width:0}
    .list-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .list-author{font-size:12px;color:var(--text2);margin-bottom:4px}
    .chevron svg{width:16px;height:16px;color:var(--text2)}

    /* ── SETTINGS ── */
    .settings-group{margin-bottom:22px}
    .settings-label{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px;padding:0 2px}
    .settings-card{background:var(--card);border-radius:14px;border:0.5px solid var(--border);overflow:hidden}
    .settings-row{
      display:flex;align-items:center;gap:12px;
      padding:14px 16px;border-bottom:0.5px solid var(--border);
      cursor:pointer;transition:background 0.15s;
    }
    .settings-row:last-child{border-bottom:none}
    .settings-row:active{background:var(--bg2)}
    .settings-icon{color:var(--accent);flex-shrink:0}
    .settings-icon svg{width:22px;height:22px}
    .settings-body{flex:1}
    .settings-row-title{font-size:14px;color:var(--text)}
    .settings-row-sub{font-size:12px;color:var(--text2);margin-top:1px}

    /* ── TOGGLE ── */
    .toggle{
      width:44px;height:26px;border-radius:13px;
      background:var(--bg2);border:0.5px solid var(--border);
      position:relative;cursor:pointer;transition:background 0.25s;flex-shrink:0;
    }
    .toggle.on{background:var(--accent);border-color:var(--accent)}
    .toggle-dot{
      width:22px;height:22px;border-radius:50%;background:#fff;
      position:absolute;top:2px;left:2px;
      transition:transform 0.25s;box-shadow:0 1px 4px rgba(0,0,0,0.4);
    }
    .toggle.on .toggle-dot{transform:translateX(18px)}

    /* ── LANG CHIPS (igual que Palabra Diaria) ── */
    .lang-grid{display:flex;flex-wrap:wrap;gap:8px}
    .lang-option{
      background:var(--card);border:1px solid var(--border);
      border-radius:20px;padding:8px 18px;
      cursor:pointer;transition:all 0.15s;
      font-size:14px;font-weight:600;color:var(--text2);
    }
    .lang-option.active{border-color:var(--accent);color:var(--accent);background:var(--tag)}

    /* ── DEV CARD ── */
    .dev-card{
      background:var(--card);border:0.5px solid var(--border);
      border-radius:14px;padding:20px;
    }
    .dev-avatar{
      width:54px;height:54px;border-radius:12px;
      background:var(--accent);
      display:flex;align-items:center;justify-content:center;
      font-size:26px;margin-bottom:12px;
    }
    .dev-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px}
    .dev-role{font-size:13px;color:var(--accent2);font-weight:600;margin-bottom:6px}
    .dev-mail{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
    .app-version{font-size:11px;color:var(--text2);text-align:center;padding:12px 0 4px}
    .fmt-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px}
    .fmt-wrap .fmt-tag{font-size:11px;padding:4px 10px}

    /* ── READER ── */
    .reader-topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 16px;background:var(--navbar);
      border-bottom:0.5px solid var(--border);flex-shrink:0;
    }
    .reader-book-title{
      font-size:14px;font-weight:600;color:var(--text);
      flex:1;text-align:center;overflow:hidden;
      text-overflow:ellipsis;white-space:nowrap;margin:0 8px;
    }
    .read-progress-track{height:3px;background:var(--bg2);flex-shrink:0}
    .read-progress-fill{height:3px;background:var(--accent);transition:width 0.4s}

    /* Navegación de capítulos */
    .chapter-nav{
      display:flex;align-items:center;gap:8px;
      padding:8px 12px;background:var(--bg2);
      border-bottom:0.5px solid var(--border);flex-shrink:0;
      overflow-x:auto;scrollbar-width:none;
    }
    .chapter-nav::-webkit-scrollbar{display:none}
    .ch-btn{
      flex-shrink:0;padding:5px 12px;border-radius:16px;
      font-size:11px;font-weight:600;
      border:0.5px solid var(--border);
      background:var(--card);color:var(--text2);
      cursor:pointer;white-space:nowrap;transition:all 0.15s;
    }
    .ch-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

    .reader-body{
      flex:1;padding:12px 6px;
      font-size:17px;line-height:1.85;color:var(--text);
      font-family:Georgia,'Times New Roman',serif;
      overflow-y:auto;-webkit-overflow-scrolling:touch;
      word-break:break-word;
      background:var(--bg);
    }
    /* Cuando hay canvas PDF, fondo neutro oscuro */
    .reader-body.pdf-mode{
      background:#111;
      padding:6px 4px;
      overflow-y:auto !important;
      -webkit-overflow-scrolling:touch;
    }
    /* Imágenes dentro del epub */
    .reader-body img{
      max-width:100%;height:auto;
      border-radius:8px;margin:12px 0;display:block;
    }
    .reader-body p{margin-bottom:1.1em}
    .reader-body h1,.reader-body h2,.reader-body h3{
      color:var(--text);font-family:inherit;
      margin:1.2em 0 0.5em;line-height:1.3;
    }
    .reader-footer{
      display:flex;align-items:center;gap:8px;
      padding:10px 16px;background:var(--navbar);
      border-top:0.5px solid var(--border);flex-shrink:0;
    }
    .page-info{flex:1;text-align:center;font-size:12px;color:var(--text2)}
    .nav-arrow{
      background:var(--card);border:0.5px solid var(--border);
      border-radius:10px;padding:8px 16px;
      font-size:12px;font-weight:600;color:var(--text2);
      cursor:pointer;display:flex;align-items:center;gap:4px;
      white-space:nowrap;
    }
    .nav-arrow:active{background:var(--bg2)}
    .nav-arrow svg{width:16px;height:16px}
    .nav-arrow.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

    /* ── MODAL ── */
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,0.65);
      display:flex;align-items:flex-end;justify-content:center;
      z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.25s;
    }
    .modal-backdrop.show{opacity:1;pointer-events:all}
    .modal-sheet{
      background:var(--bg2);width:100%;max-width:540px;
      border-radius:20px 20px 0 0;
      padding:16px 16px 30px;
      transform:translateY(100%);
      transition:transform 0.3s cubic-bezier(.4,0,.2,1);
      max-height:80vh;overflow-y:auto;
    }
    .modal-backdrop.show .modal-sheet{transform:translateY(0)}
    .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
    .modal-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:5px}
    .modal-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
    .perm-notice{
      background:var(--tag);color:var(--tagtext);
      border-radius:10px;padding:12px 14px;
      font-size:12px;line-height:1.5;margin-bottom:16px;
      display:flex;gap:10px;align-items:flex-start;
    }
    .perm-notice svg{width:18px;height:18px;flex-shrink:0}
    .fmt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .fmt-item{
      background:var(--card);border-radius:10px;padding:12px 6px;
      text-align:center;font-size:11px;font-weight:700;color:var(--text2);
      border:0.5px solid var(--border);cursor:pointer;transition:all 0.15s;
    }
    .fmt-item:active{background:var(--tag);color:var(--tagtext)}
    .fmt-item svg{width:22px;height:22px;color:var(--accent);display:block;margin:0 auto 5px}
    .modal-actions{display:flex;gap:10px}
    .btn-cancel{
      flex:1;padding:13px;border-radius:12px;
      border:0.5px solid var(--border);background:var(--card);
      color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;
    }
    .btn-primary{
      flex:1;padding:13px;border-radius:12px;border:none;
      background:var(--accent);color:#fff;
      font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
      display:flex;align-items:center;justify-content:center;gap:6px;
    }

    /* ── EMPTY ── */
    .empty-state{text-align:center;padding:50px 24px}
    .empty-state svg{width:52px;height:52px;color:var(--border);display:block;margin:0 auto 14px}
    .empty-state p{font-size:14px;color:var(--text2)}

    /* ── LOADING / TOAST ── */
    .loading-overlay{
      position:fixed;inset:0;background:var(--bg);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      z-index:500;gap:16px;
    }
    .spinner{
      width:36px;height:36px;border:3px solid var(--border);
      border-top-color:var(--accent);border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-size:14px;color:var(--text2)}
    .toast{
      position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:var(--card);color:var(--text);border:0.5px solid var(--border);
      padding:10px 20px;border-radius:20px;
      font-size:13px;font-weight:500;z-index:2000;
      opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;
    }
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div id="app">

<!-- ══════════════ INICIO ══════════════ -->
<section class="screen active" id="screen-home">
  <div class="topbar">
    <div class="topbar-title">
      <div class="app-logo">✦</div>
      LibroLibre
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="pickFile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>    </div>
  </div>
  <div class="content">
    <div id="hero-banner" style="display:none" class="hero-banner">
      <div class="hero-cover" id="hero-emoji">📖</div>
      <div class="hero-info">
        <div class="hero-label">✦ Seguir leyendo</div>
        <div class="hero-title" id="hero-title">—</div>
        <div class="hero-author" id="hero-author">—</div>
        <div class="progress-track"><div class="progress-fill" id="hero-progress" style="width:0%"></div></div>
        <button class="hero-btn" onclick="continueReading()">Continuar lectura</button>
      </div>
    </div>

    <div class="section-title" id="recent-title" style="display:none">Recientes</div>
    <div class="books-row" id="books-row"></div>

    <div class="section-title" style="margin-top:20px">Colecciones</div>
    <div class="col-grid">
      <div class="col-card" onclick="goScreen('library')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <div class="col-card-title">Mi biblioteca</div>
        <div class="col-card-sub" id="home-count">0 documentos</div>
      </div>
      <div class="col-card" onclick="goScreen('library');setLibFilter('fav',null)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <div class="col-card-title">Favoritos</div>
        <div class="col-card-sub" id="home-fav">0 documentos</div>
      </div>
    </div>
    <div id="home-empty" style="display:none">
      <div class="
